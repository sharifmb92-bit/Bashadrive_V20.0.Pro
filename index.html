<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Compact</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,600,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: ui-sans-serif, system-ui, -apple-system;
            padding-top: env(safe-area-inset-top);
            overflow: hidden; /* Evitamos scroll global si es posible */
        }
        .contenedor-principal {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .lista-dias {
            flex-grow: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .card-dia {
            background: #111827;
            border-radius: 0.75rem;
            margin-bottom: 6px;
            padding: 8px 12px;
            border-left: 6px solid #374151;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .border-expres { border-left-color: #0ea5e9; }  
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #4b5563; opacity: 0.6; }

        .bus-badge {
            background: #f97316;
            color: #000;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 1.1rem;
        }
        .texto-servicio {
            font-size: 0.95rem;
            font-weight: 800;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .texto-fecha {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: bold;
        }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <div class="contenedor-principal">
        <!-- Header muy compacto -->
        <header class="p-3 flex justify-between items-center border-b border-white/10 bg-black">
            <div>
                <h1 class="text-sm font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            </div>
            <div class="flex gap-3">
                <button @click="borrarTodo()" class="text-red-500"><span class="material-symbols-outlined">delete</span></button>
                <button @click="ui.showImport = true" class="bg-orange-600 px-3 py-1 rounded-lg text-xs font-black">PEGAR</button>
            </div>
        </header>

        <main class="lista-dias">
            <template x-if="planning.length === 0">
                <div class="text-center py-20 opacity-20">
                    <p class="text-xs font-black uppercase">Copia el mail y dale a PEGAR</p>
                </div>
            </template>

            <template x-for="(dia, index) in planning" :key="index">
                <div class="card-dia" :class="getEstiloDia(dia)">
                    <!-- Info Fecha -->
                    <div class="w-16 flex-shrink-0 border-r border-white/5">
                        <p class="text-[10px] font-black text-orange-500 leading-none" x-text="dia.diaSemana.substring(0,3)"></p>
                        <p class="texto-fecha" x-text="dia.fecha"></p>
                    </div>

                    <!-- Info Servicio -->
                    <div class="flex-grow min-w-0">
                        <h2 class="texto-servicio truncate text-white" x-text="dia.servicio"></h2>
                        <div class="flex gap-3 text-[10px] font-bold mt-0.5 text-gray-400">
                            <span x-show="dia.entrada" x-text="'IN: ' + dia.entrada"></span>
                            <span x-show="dia.salida" x-text="'OUT: ' + dia.salida"></span>
                        </div>
                    </div>

                    <!-- Bus y Editar -->
                    <div class="flex items-center gap-2">
                        <template x-if="dia.bus">
                            <span class="bus-badge" x-text="dia.bus"></span>
                        </template>
                        <button @click="abrirEditor(index)" class="text-gray-500">
                            <span class="material-symbols-outlined text-lg">edit</span>
                        </button>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- Modal Importar (Pegar Texto) -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black z-[100] p-4 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-black text-orange-500">PEGAR CUADRANTE</h2>
            <button @click="ui.showImport = false"><span class="material-symbols-outlined">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-gray-900 border border-white/10 rounded-xl p-3 text-sky-400 font-mono text-xs outline-none" placeholder="Pega el email aquí..."></textarea>
        <button @click="procesarSuperInteligente(inputRaw)" class="mt-3 bg-orange-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">PROCESAR</button>
    </div>

    <!-- Modal Editar (Ajuste Manual) -->
    <div x-show="ui.showEdit" x-cloak class="fixed inset-0 bg-black/95 z-[110] p-4 flex items-center justify-center">
        <div class="bg-gray-900 border border-white/20 rounded-2xl p-5 w-full max-w-xs">
            <h3 class="text-sm font-black text-orange-500 uppercase mb-4" x-text="'Ajustar ' + editForm.diaSemana"></h3>
            
            <div class="space-y-3">
                <input type="text" x-model="editForm.fecha" class="w-full bg-black border border-white/10 rounded p-2 text-sm text-white" placeholder="Fecha"/>
                <input type="text" x-model="editForm.servicio" class="w-full bg-black border border-white/10 rounded p-2 text-sm text-white uppercase" placeholder="Servicio"/>
                <div class="flex gap-2">
                    <input type="text" x-model="editForm.entrada" class="w-1/2 bg-black border border-white/10 rounded p-2 text-sm text-white" placeholder="Entrada"/>
                    <input type="text" x-model="editForm.salida" class="w-1/2 bg-black border border-white/10 rounded p-2 text-sm text-white" placeholder="Salida"/>
                </div>
                <input type="text" x-model="editForm.bus" class="w-full bg-black border border-white/10 rounded p-2 text-lg text-orange-500 font-black text-center" placeholder="Bus"/>
            </div>

            <div class="flex gap-2 mt-5">
                <button @click="ui.showEdit = false" class="flex-1 bg-gray-800 py-2 rounded font-bold text-xs">CERRAR</button>
                <button @click="guardarCambios()" class="flex-1 bg-orange-600 py-2 rounded font-black text-xs">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false, showEdit: false },
                inputRaw: '',
                planning: [],
                editIndex: null,
                editForm: { diaSemana: '', fecha: '', servicio: '', entrada: '', salida: '', bus: '' },

                init() {
                    const saved = localStorage.getItem('basha_v6');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstiloDia(dia) {
                    const s = dia.servicio?.toUpperCase() || '';
                    if (s.includes('LIBRE') || s.includes('DESCANS')) return 'border-libre';
                    if (s.includes('EXPRES') || s.includes('BINTAUFA')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('TOMAS') || s.includes('MAÑANA')) return 'border-escolar';
                    return 'border-tarde';
                },

                abrirEditor(index) {
                    this.editIndex = index;
                    this.editForm = { ...this.planning[index] };
                    this.ui.showEdit = true;
                },

                guardarCambios() {
                    this.planning[this.editIndex] = { ...this.editForm };
                    this.save();
                    this.ui.showEdit = false;
                },

                procesarSuperInteligente(texto) {
                    if (!texto.trim()) return;

                    const diasNombres = ["LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO", "DOMINGO"];
                    const lineas = texto.split(/[\n\t\r]+/).map(l => l.trim()).filter(l => l.length > 0);
                    
                    let temporal = diasNombres.map(d => ({
                        diaSemana: d, fecha: '', servicio: 'SIN ASIGNAR', entrada: '', salida: '', bus: ''
                    }));

                    // Estrategia: Buscar todas las fechas, todas las horas y todos los buses
                    const fechasEncontradas = texto.match(/\b\d{1,2}[\/\-\.]\d{1,2}([\/\-\.]\d{2,4})?\b/g) || [];
                    const horasEncontradas = texto.match(/\b\d{2}:\d{2}\b/g) || [];
                    // Buscamos números de bus típicos (56, 67, 76, 86, 101, etc)
                    const busesEncontrados = texto.match(/(?<![:\d])\b(56|67|76|86|101|102|80|90|15|20)\b(?![%:\d])/g) || [];

                    // Asignar fechas por orden
                    fechasEncontradas.forEach((f, i) => { if(i < 7) temporal[i].fecha = f; });

                    // Asignar nombres de servicio
                    // Buscamos líneas que no sean fechas, ni días, ni horas
                    let serviciosFiltrados = lineas.filter(l => {
                        const u = l.toUpperCase();
                        return !diasNombres.includes(u) && 
                               !l.match(/\d{2}:\d{2}/) && 
                               !l.match(/\d{2}[\/\-\.]\d{2}/) &&
                               l.length > 3;
                    });

                    temporal.forEach((dia, i) => {
                        // Asignar servicio por posición
                        if (serviciosFiltrados[i]) dia.servicio = serviciosFiltrados[i];
                        
                        // Asignar horas (normalmente vienen de 2 en 2: entrada y salida)
                        if (horasEncontradas[i*2]) dia.entrada = horasEncontradas[i*2];
                        if (horasEncontradas[i*2 + 1]) dia.salida = horasEncontradas[i*2 + 1];

                        // Asignar bus por posición
                        if (busesEncontrados[i]) dia.bus = busesEncontrados[i];
                        
                        // Si el servicio detectado dice "LIBRE" o similar
                        if (dia.servicio.toUpperCase().includes('LIBRE') || dia.servicio.toUpperCase().includes('DESCANS')) {
                            dia.bus = '';
                            dia.entrada = '';
                            dia.salida = '';
                        }
                    });

                    this.planning = temporal;
                    this.save();
                    this.ui.showImport = false;
                },

                save() {
                    localStorage.setItem('basha_v6', JSON.stringify(this.planning));
                },

                borrarTodo() {
                    if (confirm('¿Limpiar cuadrante?')) {
                        this.planning = [];
                        localStorage.removeItem('basha_v6');
                    }
                }
            }
        }
    </script>
</body>
</html>
