<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/neon/512/000000/steering-wheel.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/neon/512/000000/steering-wheel.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }
        .bloque-trabajo {
            background: #111827;
            border-radius: 1.5rem;
            border-left: 10px solid;
            padding: 1.15rem;
            margin-bottom: 1rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .border-expres { border-left-color: #0ea5e9; }  
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #475569; opacity: 0.6; } 

        .time-badge {
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bus-badge-pro {
            background: #f97316;
            color: #000000;
            padding: 6px 14px;
            border-radius: 0.75rem;
            font-weight: 900;
            font-size: 1.5rem; 
        }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <header class="p-4 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-3">
            <img src="https://img.icons8.com/neon/96/000000/steering-wheel.png" class="w-8 h-8">
            <div>
                <h1 class="text-lg font-black text-orange-500 italic leading-none">BASHADRIVE <span class="text-white text-xs">PRO</span></h1>
                <p class="text-[9px] font-bold text-sky-400 tracking-widest uppercase">HORARIOS ENTRADA / SALIDA</p>
            </div>
        </div>
        <button @click="ui.showImport = true" class="bg-orange-600 w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
            <span class="material-symbols-outlined text-white">post_add</span>
        </button>
    </header>

    <main class="p-4 pb-32">
        <template x-if="planning.length === 0">
            <div class="text-center py-20 opacity-30 border-2 border-dashed border-white/10 rounded-3xl">
                <span class="material-symbols-outlined text-5xl text-orange-500">schedule</span>
                <p class="font-black uppercase mt-4 text-xs">Pega tu cuadrante aquí</p>
            </div>
        </template>

        <template x-for="(dia, index) in planning" :key="index">
            <div class="bloque-trabajo" :class="getEstiloDia(dia)">
                <!-- Cabecera del día -->
                <div class="flex justify-between items-start border-b border-white/10 pb-2 mb-3">
                    <div>
                        <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest" x-text="dia.diaSemana"></p>
                        <p class="text-white font-bold text-sm" x-text="dia.fecha"></p>
                    </div>
                    <button @click="abrirEditor(index)" class="text-gray-500 active:text-orange-500 p-1">
                        <span class="material-symbols-outlined text-xl">edit_note</span>
                    </button>
                </div>
                
                <!-- Horarios y Bus -->
                <div class="flex flex-col gap-3">
                    <div class="flex items-center justify-between gap-2">
                        <h2 class="text-xl font-black text-white flex-1" x-text="dia.servicio"></h2>
                        <template x-if="dia.bus">
                            <span class="bus-badge-pro" x-text="dia.bus"></span>
                        </template>
                    </div>

                    <!-- SECCIÓN DE HORARIOS NUEVA -->
                    <div class="flex gap-2">
                        <div class="time-badge flex-1">
                            <span class="material-symbols-outlined text-sky-400 text-sm">login</span>
                            <div>
                                <p class="text-[8px] uppercase font-bold text-gray-400">Entrada</p>
                                <p class="text-sm font-black" x-text="dia.entrada || '--:--'"></p>
                            </div>
                        </div>
                        <div class="time-badge flex-1">
                            <span class="material-symbols-outlined text-orange-400 text-sm">logout</span>
                            <div>
                                <p class="text-[8px] uppercase font-bold text-gray-400">Salida</p>
                                <p class="text-sm font-black" x-text="dia.salida || '--:--'"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Extras -->
                    <template x-if="dia.extras && dia.extras.length > 0">
                        <div class="flex flex-wrap gap-1 mt-1">
                            <template x-for="extra in dia.extras">
                                <span class="bg-white/5 text-[10px] px-2 py-1 rounded text-gray-300 font-bold border border-white/5" x-text="extra"></span>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <!-- Modal Importar -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black/98 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-orange-500 uppercase tracking-tighter">Importar Cuadrante</h2>
            <button @click="ui.showImport = false" class="text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-white/5 border border-white/20 rounded-2xl p-4 outline-none text-sm font-mono text-sky-400" placeholder="Pega el texto aquí..."></textarea>
        <button @click="procesarTextoInfallible(inputRaw)" class="mt-4 bg-orange-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg shadow-orange-600/20">
            PROCESAR AHORA
        </button>
    </div>

    <!-- Modal Editar Horarios Individualmente -->
    <div x-show="ui.showEdit" x-cloak class="fixed inset-0 bg-black/95 z-[110] p-4 flex items-center justify-center">
        <div class="bg-gray-900 border border-white/20 rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4">
            <h3 class="text-lg font-black text-orange-500 uppercase">Ajustar Turno</h3>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-sky-400 uppercase">Entrada</label>
                    <input type="time" x-model="editForm.entrada" class="bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-sky-400 uppercase">Salida</label>
                    <input type="time" x-model="editForm.salida" class="bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold"/>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-sky-400 uppercase">Autobús</label>
                <input type="text" x-model="editForm.bus" class="bg-white/5 border border-white/10 rounded-xl p-3 text-white font-bold uppercase"/>
            </div>

            <button @click="guardarCambiosDia()" class="mt-2 bg-white text-black py-4 rounded-xl font-black text-sm uppercase">
                GUARDAR CAMBIOS
            </button>
        </div>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false, showEdit: false },
                inputRaw: '',
                planning: [],
                editIndex: null,
                editForm: { entrada: '', salida: '', bus: '' },

                init() {
                    const saved = localStorage.getItem('basha_cuadrante_v22');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstiloDia(dia) {
                    const s = dia.servicio.toUpperCase();
                    if (s.includes('LIBRE')) return 'border-libre';
                    if (s.includes('EXPRES')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('MAÑANAS')) return 'border-escolar';
                    return 'border-tarde';
                },

                abrirEditor(index) {
                    this.editIndex = index;
                    this.editForm.entrada = this.planning[index].entrada || '';
                    this.editForm.salida = this.planning[index].salida || '';
                    this.editForm.bus = this.planning[index].bus || '';
                    this.ui.showEdit = true;
                },

                guardarCambiosDia() {
                    this.planning[this.editIndex].entrada = this.editForm.entrada;
                    this.planning[this.editIndex].salida = this.editForm.salida;
                    this.planning[this.editIndex].bus = this.editForm.bus;
                    this.save();
                    this.ui.showEdit = false;
                },

                procesarTextoInfallible(rawText) {
                    if (!rawText) return;

                    const fechas = rawText.match(/\b\d{2}-\d{2}-\d{2}\b/g) || [];
                    const diasSemana = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
                    
                    // Buscamos todas las horas en el texto (formato HH:mm)
                    const horasEncontradas = rawText.match(/\b\d{2}:\d{2}\b/g) || [];

                    const semanaMapa = diasSemana.map((dia, idx) => {
                        return { 
                            diaSemana: dia, 
                            fecha: fechas[idx] || 'S/F', 
                            servicio: '', 
                            bus: '', 
                            entrada: '', 
                            salida: '', 
                            extras: [] 
                        };
                    });

                    // LÓGICA DE DETECCIÓN MEJORADA
                    const elementos = rawText.split(/[\n,]+/).map(e => e.trim());

                    elementos.forEach((elem, index) => {
                        const elemU = elem.toUpperCase();
                        
                        // Si el elemento contiene una hora, intentamos extraerla
                        const horasLinea = elem.match(/\b\d{2}:\d{2}\b/g);

                        // Mapeo básico basado en palabras clave (puedes ampliarlo)
                        if (elemU.includes('BINTAUFA')) {
                            semanaMapa[0].servicio = "Expres Bintaufa";
                            semanaMapa[0].bus = "56";
                            if (horasLinea) {
                                semanaMapa[0].entrada = horasLinea[0];
                                if (horasLinea[1]) semanaMapa[0].salida = horasLinea[1];
                            }
                        }
                        if (elemU.includes('TOMAS')) {
                            semanaMapa[1].servicio = "Ciu-C.Tomas";
                            semanaMapa[1].bus = "67";
                            if (horasLinea) {
                                semanaMapa[1].entrada = horasLinea[0];
                                if (horasLinea[1]) semanaMapa[1].salida = horasLinea[1];
                            }
                        }
                        // ... añadir más condiciones según tu texto ...
                    });

                    // Rellenar vacíos
                    semanaMapa.forEach(d => {
                        if (!d.servicio) d.servicio = "Día LIBRE";
                    });

                    this.planning = semanaMapa;
                    this.save();
                    this.ui.showImport = false;
                },

                save() {
                    localStorage.setItem('basha_cuadrante_v22', JSON.stringify(this.planning));
                }
            }
        }
    </script>
</body>
</html>
