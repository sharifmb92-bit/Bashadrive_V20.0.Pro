<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro V7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }
        .card-dia {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 1.25rem;
            margin-bottom: 0.6rem;
            padding: 0.85rem 1.1rem;
            border-left: 8px solid #374151;
        }
        .card-hoy {
            border: 1px solid #f97316 !important;
            border-left-width: 8px !important;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }
        .border-expres { border-left-color: #0ea5e9; }  
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #4b5563; opacity: 0.7; }

        .bus-badge {
            background: #f97316;
            color: #000000;
            padding: 0.25rem 0.6rem;
            border-radius: 0.6rem;
            font-weight: 900;
            font-size: 1.3rem;
            line-height: 1;
        }
        .input-manual {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.6rem;
            padding: 0.6rem;
            color: white;
            width: 100%;
            font-size: 1rem;
        }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <!-- Header -->
    <header class="p-4 sticky top-0 bg-black/95 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-base font-black text-orange-500 italic leading-none">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[9px] font-bold text-sky-400 uppercase tracking-widest">Menorca • V7</p>
        </div>
        <div class="flex gap-2">
            <button @click="borrarTodo()" class="text-red-500 bg-red-500/10 w-9 h-9 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined text-xl">delete</span>
            </button>
            <button @click="ui.showImport = true" class="bg-orange-600 w-9 h-9 rounded-full flex items-center justify-center shadow-lg text-white">
                <span class="material-symbols-outlined text-xl">add</span>
            </button>
        </div>
    </header>

    <main class="p-3 pb-24">
        <template x-for="(dia, index) in planning" :key="index">
            <div class="card-dia" :class="[getEstiloDia(dia), esHoy(dia.fecha) ? 'card-hoy' : '']">
                <div class="flex justify-between items-start mb-1.5">
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="text-orange-500 font-black uppercase text-[10px]" x-text="dia.diaSemana"></h3>
                            <template x-if="esHoy(dia.fecha)">
                                <span class="text-[8px] font-black text-sky-400 uppercase tracking-tighter">● Hoy</span>
                            </template>
                        </div>
                        <p class="text-gray-400 font-bold text-xs" x-text="dia.fecha"></p>
                    </div>
                    <button @click="abrirEditor(index)" class="text-gray-500 p-1">
                        <span class="material-symbols-outlined text-lg">edit</span>
                    </button>
                </div>

                <div class="flex items-center justify-between gap-3">
                    <div class="flex-1">
                        <h2 class="text-lg font-black text-white uppercase leading-tight" x-text="dia.servicio"></h2>
                        <div class="flex gap-4 mt-1 text-gray-400 font-bold text-sm">
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px] text-sky-400">login</span>
                                <span x-text="dia.entrada || '--:--'"></span>
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px] text-orange-400">logout</span>
                                <span x-text="dia.salida || '--:--'"></span>
                            </div>
                        </div>
                    </div>
                    <template x-if="dia.bus">
                        <span class="bus-badge" x-text="dia.bus"></span>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <!-- Modal Importar -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-orange-500 uppercase">Pegar Cuadrante</h2>
            <button @click="ui.showImport = false" class="text-white"><span class="material-symbols-outlined">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-gray-900 border border-white/10 rounded-xl p-4 text-sky-400 font-mono text-sm outline-none" placeholder="Pega el mail aquí..."></textarea>
        <button @click="procesarMail(inputRaw)" class="mt-4 bg-orange-600 text-white py-4 rounded-xl font-black uppercase text-sm"> Generar Semana </button>
    </div>

    <!-- Modal Editar -->
    <div x-show="ui.showEdit" x-cloak class="fixed inset-0 bg-black/95 z-[110] p-6 flex items-center justify-center">
        <div class="bg-gray-900 border border-white/20 rounded-2xl p-5 w-full max-w-sm">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-sm font-black text-orange-500 uppercase" x-text="editForm.diaSemana"></h3>
                <button @click="editForm.servicio = 'Día LIBRE'; editForm.bus = ''; editForm.entrada=''; editForm.salida=''" class="bg-gray-700 text-[10px] px-3 py-1 rounded-full font-black text-white uppercase">LIBRE</button>
            </div>
            
            <div class="space-y-3">
                <div class="flex gap-2 items-end">
                    <div class="flex-1">
                        <label class="text-[9px] font-bold text-gray-500 uppercase ml-1">Fecha</label>
                        <input type="text" x-model="editForm.fecha" class="input-manual font-bold text-center" placeholder="03/06/26"/>
                    </div>
                    <!-- Botón Varita Mágica para autocompletar fechas -->
                    <button @click="magiaFechas()" class="bg-sky-600 p-2 rounded-lg text-white" title="Autocompletar resto de semana">
                        <span class="material-symbols-outlined text-sm">auto_fix_high</span>
                    </button>
                </div>

                <input type="text" x-model="editForm.servicio" class="input-manual uppercase font-black" placeholder="Servicio/Turno"/>
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" x-model="editForm.entrada" class="input-manual text-center"/>
                    <input type="time" x-model="editForm.salida" class="input-manual text-center"/>
                </div>
                <input type="text" x-model="editForm.bus" class="input-manual text-center font-black text-orange-500 text-xl" placeholder="Nº Bus"/>
            </div>

            <div class="flex gap-2 mt-5">
                <button @click="ui.showEdit = false" class="flex-1 bg-gray-800 py-3 rounded-lg font-bold text-xs uppercase">Cerrar</button>
                <button @click="guardarCambios()" class="flex-1 bg-orange-600 py-3 rounded-lg font-black text-xs uppercase text-white">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false, showEdit: false },
                inputRaw: '',
                planning: [],
                editIndex: null,
                editForm: { diaSemana: '', fecha: '', servicio: '', entrada: '', salida: '', bus: '' },

                init() {
                    const saved = localStorage.getItem('basha_v7_data');
                    if (saved) {
                        this.planning = JSON.parse(saved);
                    } else {
                        this.crearSemanaVacia();
                    }
                },

                crearSemanaVacia() {
                    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
                    this.planning = dias.map(d => ({
                        diaSemana: d, fecha: '--', servicio: 'SIN ASIGNAR', entrada: '', salida: '', bus: ''
                    }));
                },

                esHoy(fechaStr) {
                    if (!fechaStr || fechaStr === '--') return false;
                    const hoy = new Date();
                    const d = String(hoy.getDate()).padStart(2, '0');
                    const m = String(hoy.getMonth() + 1).padStart(2, '0');
                    const y = String(hoy.getFullYear()).slice(-2);
                    const cleanFecha = fechaStr.replace(/[\/\-\.]/g, '');
                    return cleanFecha === (d + m + y);
                },

                getEstiloDia(dia) {
                    const s = dia.servicio?.toUpperCase() || '';
                    if (s.includes('LIBRE')) return 'border-libre';
                    if (s.includes('EXPRES') || s.includes('BINTAUFA')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('TOMAS') || s.includes('MAÑANA')) return 'border-escolar';
                    return 'border-tarde';
                },

                abrirEditor(index) {
                    this.editIndex = index;
                    this.editForm = { ...this.planning[index] };
                    this.ui.showEdit = true;
                },

                guardarCambios() {
                    this.planning[this.editIndex] = { ...this.editForm };
                    this.save();
                    this.ui.showEdit = false;
                },

                // MAGIA: Calcula el resto de las fechas a partir de la seleccionada
                magiaFechas() {
                    let parts = this.editForm.fecha.split(/[\/\-\.]/);
                    if (parts.length < 3) return alert("Escribe la fecha completa: DD/MM/AA");

                    let dia = parseInt(parts[0]);
                    let mes = parseInt(parts[1]) - 1;
                    let anio = parseInt(parts[2]);
                    if (anio < 100) anio += 2000;

                    let fechaBase = new Date(anio, mes, dia);
                    
                    // Rellenar desde el día editado hacia adelante
                    for (let i = 0; i < this.planning.length; i++) {
                        let nuevaFecha = new Date(fechaBase);
                        nuevaFecha.setDate(fechaBase.getDate() + (i - this.editIndex));
                        
                        let d = String(nuevaFecha.getDate()).padStart(2, '0');
                        let m = String(nuevaFecha.getMonth() + 1).padStart(2, '0');
                        let a = String(nuevaFecha.getFullYear()).slice(-2);
                        
                        this.planning[i].fecha = `${d}/${m}/${a}`;
                    }
                    this.editForm.fecha = this.planning[this.editIndex].fecha;
                    alert("¡Fechas de la semana actualizadas!");
                },

                procesarMail(texto) {
                    if (!texto.trim()) return;
                    const diasSemana = ["LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO", "DOMINGO"];
                    const regexFecha = /\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b/g;
                    const fechas = texto.match(regexFecha) || [];
                    const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    
                    this.crearSemanaVacia();

                    let diaActualIdx = -1;
                    lineas.forEach(linea => {
                        const lU = linea.toUpperCase();
                        diasSemana.forEach((d, idx) => {
                            if (lU.includes(d)) diaActualIdx = idx;
                        });

                        if (diaActualIdx !== -1 && linea.length > 5 && !diasSemana.includes(lU)) {
                            // Asignar fecha encontrada o mantener la anterior
                            if (fechas[diaActualIdx]) this.planning[diaActualIdx].fecha = fechas[diaActualIdx];
                            
                            const horas = linea.match(/\b\d{2}:\d{2}\b/g);
                            if (horas) {
                                this.planning[diaActualIdx].entrada = horas[0];
                                if (horas[1]) this.planning[diaActualIdx].salida = horas[1];
                            }
                            
                            const busMatch = linea.match(/(?<![:\d])\b(56|67|76|86|10|15|20|101|102)\b(?![%:\d])/);
                            if (busMatch) this.planning[diaActualIdx].bus = busMatch[0];

                            if (lU.includes('LIBRE') || lU.includes('DESCANS')) {
                                this.planning[diaActualIdx].servicio = "Día LIBRE";
                            } else {
                                let nombre = linea.replace(regexFecha, '').replace(/\b\d{2}:\d{2}\b/g, '').replace(/\b\d{2,3}\b/g, '').trim();
                                if (nombre.length > 2) this.planning[diaActualIdx].servicio = nombre;
                            }
                        }
                    });

                    this.save();
                    this.ui.showImport = false;
                },

                save() {
                    localStorage.setItem('basha_v7_data', JSON.stringify(this.planning));
                },

                borrarTodo() {
                    if (confirm('¿Limpiar cuadrante?')) {
                        this.crearSemanaVacia();
                        localStorage.removeItem('basha_v7_data');
                    }
                }
            }
        }
    </script>
</body>
</html>
