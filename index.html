<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro V7</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: ui-sans-serif, system-ui, -apple-system;
            padding-top: env(safe-area-inset-top);
        }
        .card-dia {
            background: #111827;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            padding: 1.15rem;
            border-left: 8px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* Colores según turno */
        .border-expres { border-left-color: #0ea5e9; }  
        .border-escolar { border-left-color: #10b981; } 
        .border-tarde { border-left-color: #f59e0b; }   
        .border-libre { border-left-color: #4b5563; opacity: 0.7; }

        .bus-badge {
            background: #f97316;
            color: #000;
            padding: 4px 10px;
            border-radius: 0.75rem;
            font-weight: 900;
            font-size: 1.5rem; /* Tamaño Bus perfecto */
            line-height: 1;
        }
        .texto-servicio {
            font-size: 1.15rem; /* Tamaño equilibrado */
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
        }
        .texto-fecha {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: bold;
        }
        .input-basha {
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 0.75rem;
            padding: 0.8rem;
            color: white;
            font-size: 1rem;
            width: 100%;
        }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <!-- Header Fijo -->
    <header class="p-4 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-lg font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[9px] font-bold text-sky-400 tracking-widest uppercase">Menorca • V7 Vertical</p>
        </div>
        <div class="flex gap-2">
            <button @click="borrarTodo()" class="bg-red-500/20 text-red-500 w-10 h-10 rounded-full flex items-center justify-center">
                <span class="material-symbols-outlined">delete</span>
            </button>
            <button @click="ui.showImport = true" class="bg-orange-600 px-4 py-2 rounded-xl text-xs font-black uppercase">Pegar</button>
        </div>
    </header>

    <main class="p-3">
        <template x-if="planning.length === 0">
            <div class="text-center py-20 opacity-30 border-2 border-dashed border-white/10 rounded-[2rem]">
                <span class="material-symbols-outlined text-5xl mb-3">content_paste_go</span>
                <p class="text-sm font-bold uppercase">Copia y pega tu mail</p>
            </div>
        </template>

        <template x-for="(dia, index) in planning" :key="index">
            <div class="card-dia" :class="getEstiloDia(dia)">
                
                <!-- Columna Izquierda: Fecha y Servicio -->
                <div class="flex-grow">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-orange-500 font-black text-xs uppercase" x-text="dia.diaSemana"></span>
                        <span class="texto-fecha" x-text="dia.fecha"></span>
                    </div>
                    <h2 class="texto-servicio text-white" x-text="dia.servicio"></h2>
                    <div class="flex gap-4 mt-2">
                        <div class="flex items-center gap-1 text-sky-400 font-bold text-sm">
                            <span class="material-symbols-outlined text-xs">login</span>
                            <span x-text="dia.entrada || '--:--'"></span>
                        </div>
                        <div class="flex items-center gap-1 text-orange-400 font-bold text-sm">
                            <span class="material-symbols-outlined text-xs">logout</span>
                            <span x-text="dia.salida || '--:--'"></span>
                        </div>
                    </div>
                </div>

                <!-- Columna Derecha: Bus y Lápiz -->
                <div class="flex flex-col items-end gap-3 ml-2">
                    <template x-if="dia.bus">
                        <span class="bus-badge" x-text="dia.bus"></span>
                    </template>
                    <button @click="abrirEditor(index)" class="text-gray-500 bg-white/5 p-2 rounded-lg">
                        <span class="material-symbols-outlined text-xl">edit_note</span>
                    </button>
                </div>
            </div>
        </template>
    </main>

    <!-- Pantalla para Pegar (Importar) -->
    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-orange-500 italic">PEGAR CUADRANTE</h2>
            <button @click="ui.showImport = false"><span class="material-symbols-outlined">close</span></button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-gray-900 border-2 border-white/10 rounded-2xl p-4 text-sky-400 font-mono text-base outline-none" placeholder="Pega el texto del mail aquí..."></textarea>
        <button @click="procesarVertical(inputRaw)" class="mt-4 bg-orange-600 text-white py-5 rounded-2xl font-black text-lg uppercase shadow-xl">
            PROCESAR AHORA
        </button>
    </div>

    <!-- Pantalla para Editar (Manual) -->
    <div x-show="ui.showEdit" x-cloak class="fixed inset-0 bg-black/95 z-[110] p-6 flex items-center justify-center">
        <div class="bg-gray-900 border border-white/20 rounded-[2rem] p-6 w-full max-w-sm">
            <h3 class="text-lg font-black text-orange-500 uppercase mb-4" x-text="'EDITAR ' + editForm.diaSemana"></h3>
            
            <div class="space-y-4">
                <input type="text" x-model="editForm.servicio" class="input-basha font-black uppercase text-orange-500" placeholder="Nombre del turno"/>
                <div class="grid grid-cols-2 gap-3">
                    <input type="time" x-model="editForm.entrada" class="input-basha text-center font-bold"/>
                    <input type="time" x-model="editForm.salida" class="input-basha text-center font-bold"/>
                </div>
                <input type="text" x-model="editForm.bus" class="input-basha text-center font-black text-2xl" placeholder="Nº Bus"/>
                <input type="text" x-model="editForm.fecha" class="input-basha text-center text-sm font-bold text-gray-400" placeholder="Fecha"/>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button @click="ui.showEdit = false" class="bg-gray-800 py-4 rounded-xl font-bold">CERRAR</button>
                <button @click="guardarCambios()" class="bg-orange-600 py-4 rounded-xl font-black uppercase">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false, showEdit: false },
                inputRaw: '',
                planning: [],
                editIndex: null,
                editForm: { diaSemana: '', fecha: '', servicio: '', entrada: '', salida: '', bus: '' },

                init() {
                    const saved = localStorage.getItem('basha_v7_vertical');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstiloDia(dia) {
                    const s = dia.servicio?.toUpperCase() || '';
                    if (s.includes('LIBRE') || s.includes('DESCANS')) return 'border-libre';
                    if (s.includes('EXPRES') || s.includes('BINTAUFA')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('TOMAS') || s.includes('MAÑANA')) return 'border-escolar';
                    return 'border-tarde';
                },

                abrirEditor(index) {
                    this.editIndex = index;
                    this.editForm = { ...this.planning[index] };
                    this.ui.showEdit = true;
                },

                guardarCambios() {
                    this.planning[this.editIndex] = { ...this.editForm };
                    this.save();
                    this.ui.showEdit = false;
                },

                procesarVertical(texto) {
                    if (!texto.trim()) return;

                    const diasNombres = ["LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO", "DOMINGO"];
                    
                    // Extraer TODO el contenido relevante
                    const fechas = texto.match(/\b\d{1,2}[\/\-\.]\d{1,2}([\/\-\.]\d{2,4})?\b/g) || [];
                    const horas = texto.match(/\b\d{2}:\d{2}\b/g) || [];
                    const buses = texto.match(/(?<![:\d])\b(56|67|76|86|101|102|80|90|15|20|10)\b(?![%:\d])/g) || [];
                    
                    // Filtrar solo las palabras que parecen servicios (ej: BINTAUFA, TOMAS, MAÑANAS...)
                    const palabras = texto.split(/[\n\t\s,]+/).map(p => p.toUpperCase());
                    const serviciosReconocidos = ["BINTAUFA", "TOMAS", "MAÑANAS", "MAÑANA", "TARDE", "EXPRES", "ESC.", "ESCOLAR", "LIBRE", "DESCANS", "REFUERZO"];
                    
                    let temporal = diasNombres.map((d, i) => ({
                        diaSemana: d,
                        fecha: fechas[i] || '--/--',
                        servicio: 'SIN ASIGNAR',
                        entrada: '',
                        salida: '',
                        bus: ''
                    }));

                    // Lógica para asignar (si hay 7 elementos de cada cosa, los asignamos por orden)
                    temporal.forEach((dia, i) => {
                        // 1. Asignar Bus
                        if (buses[i]) dia.bus = buses[i];
                        
                        // 2. Asignar Horas (entrada y salida)
                        if (horas[i*2]) dia.entrada = horas[i*2];
                        if (horas[i*2 + 1]) dia.salida = horas[i*2 + 1];

                        // 3. Buscar nombre del servicio en el bloque de texto
                        // Si el texto pegado tiene servicios conocidos, los intentamos emparejar
                        const serviceMatch = palabras.find(p => serviciosReconocidos.includes(p));
                        // (Aquí simplificamos: si no detecta bien el nombre, te deja editarlo)
                    });

                    // Si hay 7 "líneas" de texto que no son números ni fechas, asumimos que son los servicios
                    const lineasLimpias = texto.split('\n').map(l => l.trim()).filter(l => l.length > 4 && !l.match(/\d{2}[\/\-]/));
                    if (lineasLimpias.length >= 7) {
                        temporal.forEach((dia, i) => {
                            dia.servicio = lineasLimpias[i];
                        });
                    }

                    this.planning = temporal;
                    this.save();
                    this.ui.showImport = false;
                },

                save() {
                    localStorage.setItem('basha_v7_vertical', JSON.stringify(this.planning));
                },

                borrarTodo() {
                    if (confirm('¿Limpiar la pantalla?')) {
                        this.planning = [];
                        localStorage.removeItem('basha_v7_vertical');
                    }
                }
            }
        }
    </script>
</body>
</html>
